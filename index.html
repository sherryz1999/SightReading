<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sight Reading Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0d1117; color: #e6edf3;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; padding: 20px; gap: 14px;
}
header { text-align: center; }
h1 { font-size: 1.8rem; font-weight: 700; color: #58a6ff; }
.tagline { color: #8b949e; font-size: 0.85rem; margin-top: 3px; }

.stats {
  display: flex; gap: 24px; background: #161b22;
  border: 1px solid #30363d; border-radius: 12px; padding: 12px 28px;
}
.stat { text-align: center; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; color: #8b949e; letter-spacing: .06em; }
.stat-value { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
#streak { color: #f78166; }

.clef-selector { display: flex; gap: 8px; width: 100%; max-width: 560px; }
.clef-btn {
  flex: 1; padding: 10px 6px;
  border: 2px solid #21262d; background: #21262d; color: #8b949e;
  border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 700;
  transition: all .15s; line-height: 1.3;
}
.clef-btn:hover { background: #2d333b; border-color: #58a6ff; }
.clef-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0e1f35; }

.timer-display {
  text-align: center; font-size: 1.6rem; font-weight: 700;
  font-variant-numeric: tabular-nums; color: #8b949e;
  margin-bottom: 10px; letter-spacing: .02em; transition: color .2s;
}
.timer-display.fast { color: #3fb950; }
.timer-display.slow { color: #f78166; }

.main-card {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 16px; padding: 22px; width: 100%; max-width: 560px;
}
.staff-wrapper {
  background: #fffef5; border-radius: 10px;
  padding: 6px 10px; margin-bottom: 18px; line-height: 0;
}
#staffSvg { width: 100%; height: auto; display: block; max-width: 540px; margin: 0 auto; }

.reveal-area {
  min-height: 50px; display: flex;
  align-items: center; justify-content: center; margin-bottom: 10px;
}
.feedback-msg { font-size: 1rem; font-weight: 600; }
.feedback-msg.ok  { color: #3fb950; }
.feedback-msg.bad { color: #f78166; }

.hint { text-align: center; color: #8b949e; font-size: 0.82rem; margin-bottom: 12px; min-height: 18px; }
.hint.scale-label { font-size: 1.25rem; font-weight: 700; color: #58a6ff; letter-spacing: .02em; }

.buttons-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 7px; margin-bottom: 13px; }
.note-btn {
  padding: 15px 0; border: 2px solid #21262d; background: #21262d;
  color: #e6edf3; border-radius: 8px; font-size: 1.1rem; font-weight: 700;
  cursor: pointer; transition: all .12s; user-select: none;
}
.note-btn:hover { background: #2d333b; border-color: #58a6ff; }
.note-btn.correct { background: #1c3a25; border-color: #3fb950; color: #3fb950; }
.note-btn.wrong   { background: #3a1c1c; border-color: #f78166; color: #f78166; }

.next-btn {
  width: 100%; padding: 13px; background: #238636;
  border: 1px solid #2ea043; border-radius: 8px; color: white;
  font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: background .15s; display: none;
}
.next-btn:hover { background: #2ea043; }
.next-btn.show  { display: block; }
.kbd-hint { text-align: center; font-size: 0.72rem; color: #484f58; margin-top: 9px; }

.settings {
  background: #161b22; border: 1px solid #30363d;
  border-radius: 16px; padding: 16px 22px; width: 100%; max-width: 560px;
}
.settings-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; color: #8b949e; margin-bottom: 9px; }
.mode-btns { display: flex; gap: 7px; }
.mode-btn {
  flex: 1; padding: 12px 6px; border: 2px solid #21262d; background: #21262d;
  color: #8b949e; border-radius: 8px; cursor: pointer;
  font-size: 0.85rem; font-weight: 600; transition: all .15s;
}
.mode-btn:hover { background: #2d333b; border-color: #58a6ff; }
.mode-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0e1f35; }

.ref-toggle-row { text-align: center; margin-top: 11px; }
.ref-btn {
  background: none; border: 1px solid #30363d; color: #8b949e;
  border-radius: 6px; padding: 6px 16px; cursor: pointer; font-size: 0.78rem; transition: all .15s;
}
.ref-btn:hover { border-color: #58a6ff; color: #58a6ff; }

.ref-panel {
  background: #161b22; border: 1px solid #30363d; border-radius: 14px;
  padding: 16px 20px; width: 100%; max-width: 560px; display: none;
}
.ref-panel.show { display: block; }
.ref-panel-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: .06em; color: #8b949e; margin-bottom: 10px; }
.ref-staff-wrap { background: #fffef5; border-radius: 8px; padding: 6px 8px; line-height: 0; overflow-x: auto; }
#refSvg { display: block; width: 100%; height: auto; }

@media (max-width: 480px) {
  .note-btn { font-size: 0.95rem; padding: 12px 0; }
  .stats { gap: 14px; padding: 10px 16px; }
  .buttons-grid { gap: 4px; }
  .clef-btn { font-size: 0.72rem; padding: 8px 4px; }
}
</style>
</head>
<body>

<header>
  <h1>Sight Reading Trainer</h1>
  <p class="tagline">Master clef note reading</p>
</header>

<div class="stats">
  <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
  <div class="stat"><div class="stat-label">Streak</div><div class="stat-value" id="streak">0</div></div>
  <div class="stat"><div class="stat-label">Accuracy</div><div class="stat-value" id="accuracy">—</div></div>
</div>

<div class="clef-selector" id="clefBtns">
  <button class="clef-btn active" onclick="setClef('bass',this)">Bass</button>
  <button class="clef-btn" onclick="setClef('treble',this)">Treble</button>
  <button class="clef-btn" onclick="setClef('alto',this)">Alto</button>
  <button class="clef-btn" onclick="setClef('tenor',this)">Tenor</button>
</div>

<div class="main-card">
  <div class="staff-wrapper">
    <svg id="staffSvg" viewBox="0 0 520 170" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
  <div class="timer-display" id="timerDisplay">0.0s</div>
  <div class="reveal-area"><div id="revealContent"></div></div>
  <p class="hint" id="hintText"></p>
  <div class="buttons-grid" id="buttonsGrid"></div>
  <button class="next-btn" id="nextBtn" onclick="nextNote()">Next Note →</button>
  <p class="kbd-hint">Keyboard: A–G to answer &nbsp;·&nbsp; Enter / Space for next</p>
</div>

<div class="settings">
  <div class="settings-title">Mode</div>
  <div class="mode-btns" id="modeBtns">
    <button class="mode-btn active" onclick="setMode('single',this)">Single Note</button>
    <button class="mode-btn" onclick="setMode('scales',this)">Random Scales</button>
  </div>
  <div class="ref-toggle-row">
    <button class="ref-btn" id="refToggleBtn" onclick="toggleRef()">Show Note Reference Chart</button>
  </div>
</div>

<div class="ref-panel" id="refPanel">
  <div class="ref-panel-title">Note Reference Chart</div>
  <div class="ref-staff-wrap">
    <svg id="refSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

// Letter at each staff position for each clef (cycles at pos 0–6)
const CLEF_BASE = { bass:'GABCDEF', treble:'EFGABCD', alto:'FGABCDE', tenor:'DEFGABC' };

// degrees: accidental for each scale step ('', '#', or 'b')

  {name:'C Major', root:'C', degrees:['','','','','','','']},
  {name:'G Major', root:'G', degrees:['','','','','','','#']},
  {name:'D Major', root:'D', degrees:['','','#','','','','#']},
  {name:'A Major', root:'A', degrees:['','','#','','','#','#']},
  {name:'E Major', root:'E', degrees:['','#','#','','','#','#']},
  {name:'B Major', root:'B', degrees:['','#','#','','#','#','#']},

// ── SVG constants ──────────────────────────────────────────────────────────────
const BY=108, STEP=6, SL=90, SR=480, NOTE_X=290, LHW=20;

// ── State ─────────────────────────────────────────────────────────────────────

let score=0, streak=0, total=0, refOpen=false, startTime=null, timerHandle=null;
let currentScale=null, scaleNoteIdx=0, scaleDone=false;

const weights = {};
[...NOTES,...ALTO_NOTES,...TREBLE_NOTES,...TENOR_NOTES].forEach(n => { if(!weights[n.name]) weights[n.name]=1; });

// ── Helpers ───────────────────────────────────────────────────────────────────
const posY = pos => BY - pos * STEP;

function ledgersFor(pos) {
  const out = [];
  if (pos <= -2) { const lo=pos%2===0?pos:pos+1; for(let p=-2;p>=lo;p-=2) out.push(p); }
  if (pos >= 10) { const hi=pos%2===0?pos:pos-1; for(let p=10;p<=hi;p+=2) out.push(p); }
  return out;
}

function el(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k,v);
  if (parent) parent.appendChild(e);
  return e;
}

const CLEF_DRAW = { bass:drawBassClef, treble:drawTrebleClef, alto:drawAltoClef, tenor:drawTenorClef };

// ── Staff & Note drawing ──────────────────────────────────────────────────────
function drawStaffLines(svg, staffRight) {
  for (let i=0; i<=4; i++)
    el('line', {x1:4, y1:posY(i*2), x2:staffRight, y2:posY(i*2), stroke:'#444', 'stroke-width':1.5}, svg);
}

function drawNote(svg, pos, nx, noteR=10, color='#1a1a2e', lhw=LHW) {
  const ny = posY(pos);
  for (const lp of ledgersFor(pos))
    el('line', {x1:nx-lhw, y1:posY(lp), x2:nx+lhw, y2:posY(lp), stroke:'#444', 'stroke-width':1.5}, svg);
  el('ellipse', {cx:nx, cy:ny, rx:noteR, ry:noteR*0.7, fill:color}, svg);
  const up = pos < 4;
  const sx = up ? nx+noteR : nx-noteR;
  el('line', {x1:sx, y1:ny, x2:sx, y2:up?ny-44:ny+44, stroke:color, 'stroke-width':2}, svg);
}

function drawAccidental(svg, pos, nx, acc) {
  el('text', {
    x:nx-14, y:posY(pos)+5, 'text-anchor':'middle',
    'font-size':13, 'font-family':'serif', fill:'#111', stroke:'none'
  }, svg).textContent = acc==='#' ? '♯' : '♭';
}

// ── Single note staff ─────────────────────────────────────────────────────────
function drawQuizStaff(pos) {
  const svg = document.getElementById('staffSvg');
  svg.innerHTML = '';
  drawStaffLines(svg, SR);
  CLEF_DRAW[clef](svg);
  drawNote(svg, pos, NOTE_X);
}

// ── Scale staff ───────────────────────────────────────────────────────────────
function generateScale() {
  const def = MAJOR_SCALES[Math.floor(Math.random() * MAJOR_SCALES.length)];
  const letters = CLEF_BASE[clef];
  const rootIdx = letters.indexOf(def.root);
  let startPos = rootIdx;
  if (startPos + 6 > 10) startPos -= 7;
  if (startPos < -2)     startPos += 7;
  const notes = def.degrees.map((acc, i) => ({
    pos: startPos + i,
    letter: letters[((startPos + i) % 7 + 7) % 7],
    acc
  }));
  return { name: def.name, notes };
}

function drawScaleStaff(notes, activeIdx, playingIdx = -1) {
  const svg = document.getElementById('staffSvg');
  svg.innerHTML = '';
  drawStaffLines(svg, SR);
  CLEF_DRAW[clef](svg);

  const startX = 82, endX = 468;
  const spacing = (endX - startX) / 6;

  notes.forEach((note, i) => {
    const nx   = startX + i * spacing;
    const done = i < activeIdx;
    const curr = i === activeIdx && activeIdx < notes.length;
    const color = done ? '#3fb950' : curr ? '#1a1a2e' : '#bbb';

    drawNote(svg, note.pos, nx, 8, color, 11);
    if (note.acc) drawAccidental(svg, note.pos, nx, note.acc);

    if (curr) {
      el('ellipse', {
        cx: nx, cy: posY(note.pos), rx: 12, ry: 8.5,
        fill: 'none', stroke: '#58a6ff', 'stroke-width': 2
      }, svg);
    }
    if (i === playingIdx) {
      el('ellipse', {
        cx: nx, cy: posY(note.pos), rx: 14, ry: 10,
        fill: 'none', stroke: '#f0b84b', 'stroke-width': 2.5
      }, svg);
    }
  });
}

// ── Reference chart ───────────────────────────────────────────────────────────
function drawRefChart() {
  const notes  = CLEF_NOTES[clef];
  const count  = notes.length;
  const gap    = Math.max(20, Math.min(40, (SR-SL-20) / (count+1)));
  const startX = SL + gap;
  const noteR  = Math.min(8, gap*0.4);
  const botNote = notes.reduce((m,n) => n.pos<m ? n.pos : m, 0);
  const svgH   = Math.max(165, BY - botNote*STEP + 40);
  const labelY = BY - botNote*STEP + 25;

  const refSvg = document.getElementById('refSvg');
  refSvg.setAttribute('viewBox', `0 0 520 ${svgH}`);
  refSvg.innerHTML = '';
  drawStaffLines(refSvg, SR);
  CLEF_DRAW[clef](refSvg);

  notes.forEach((note, i) => {
    const nx = startX + i * gap;
    drawNote(refSvg, note.pos, nx, noteR, '#2a2a6a');
    el('text', {x:nx, y:labelY, 'text-anchor':'middle', 'font-size':9,
      'font-family':'system-ui,sans-serif', fill:'#333', 'font-weight':'bold'
    }, refSvg).textContent = note.name;
  });
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerHandle);
  startTime = Date.now();
  const disp = document.getElementById('timerDisplay');
  disp.textContent = '0.0s'; disp.className = 'timer-display';
  timerHandle = setInterval(() => {
    disp.textContent = ((Date.now()-startTime)/1000).toFixed(1)+'s';
  }, 100);
}

function stopTimer() {
  clearInterval(timerHandle); timerHandle = null;
  const elapsed = startTime ? (Date.now()-startTime)/1000 : 0;
  const disp = document.getElementById('timerDisplay');
  disp.textContent = elapsed.toFixed(1)+'s';
  disp.classList.add(elapsed<=3 ? 'fast' : 'slow');
  return elapsed.toFixed(1);
}

// ── Game logic — single note ───────────────────────────────────────────────────
function pickNote() {
  const pool = CLEF_NOTES[clef];
  const totalW = pool.reduce((s,n) => s+(weights[n.name]||1), 0);
  let rand = Math.random() * totalW;
  for (const n of pool) { rand -= (weights[n.name]||1); if (rand<=0) return n; }
  return pool[pool.length-1];
}

function nextSingle() {
  answered = false; current = pickNote();
  document.getElementById('revealContent').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('nextBtn').textContent = 'Next Note →';
  const hint = document.getElementById('hintText');
  hint.className = 'hint'; hint.textContent = 'Which note is this?';
  document.querySelectorAll('.note-btn').forEach(b => { b.classList.remove('correct','wrong'); b.disabled=false; });
  drawQuizStaff(current.pos);
  startTimer();
}

function answerSingle(letter, btn) {
  if (answered) return;
  answered = true; total++;
  const elapsed = stopTimer();
  const correct = letter === current.letter;
  document.querySelectorAll('.note-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.l === current.letter) b.classList.add('correct');
  });
  if (correct) {
    score++; streak++;
    weights[current.name] = Math.max(1, (weights[current.name]||1)*0.8);
    document.getElementById('revealContent').innerHTML =
      `<span class="feedback-msg ok">✓ Correct! &nbsp;<strong>${current.name}</strong> &nbsp;·&nbsp; ${elapsed}s</span>`;
  } else {
    streak = 0; btn.classList.add('wrong');
    weights[current.name] = Math.min(10, (weights[current.name]||1)*1.6);
    document.getElementById('revealContent').innerHTML =
      `<span class="feedback-msg bad">✗ That was &nbsp;<strong>${current.name}</strong> &nbsp;·&nbsp; ${elapsed}s</span>`;
  }
  document.getElementById('hintText').textContent = '';
  updateStats();
  document.getElementById('nextBtn').classList.add('show');
}

// ── Game logic — scales ────────────────────────────────────────────────────────
function nextScale() {
  scaleDone = false; scaleNoteIdx = 0;
  currentScale = generateScale();
  document.getElementById('revealContent').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('nextBtn').textContent = 'Next Scale →';
  document.querySelectorAll('.note-btn').forEach(b => { b.classList.remove('correct','wrong'); b.disabled=false; });
  const hint = document.getElementById('hintText');
  hint.className = 'hint'; hint.textContent = '';
  drawScaleStaff(currentScale.notes, 0);
}

function answerScale(letter, btn) {
  if (scaleDone) return;
  const note = currentScale.notes[scaleNoteIdx];
  total++;
  if (letter === note.letter) {
    score++; streak++;
    weights[note.name] = Math.max(1, (weights[note.name]||1)*0.9);
    btn.classList.add('correct');
    setTimeout(() => btn.classList.remove('correct'), 350);
    scaleNoteIdx++;
    updateStats();
    if (scaleNoteIdx === currentScale.notes.length) {
      scaleDone = true;
      drawScaleStaff(currentScale.notes, scaleNoteIdx);
      const doneHint = document.getElementById('hintText');
      doneHint.className = 'hint scale-label';
      doneHint.textContent = currentScale.name;
      document.getElementById('revealContent').innerHTML =
        `<span class="feedback-msg ok">✓ Scale complete!</span>`;
      document.getElementById('nextBtn').classList.add('show');
      playScale(currentScale.notes);
    } else {
      drawScaleStaff(currentScale.notes, scaleNoteIdx);
    }
  } else {
    streak = 0;
    weights[note.name] = Math.min(10, (weights[note.name]||1)*1.4);
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 350);
    updateStats();
  }
}

// ── Audio ─────────────────────────────────────────────────────────────────────
let audioCtx = null;

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }

function noteToMidi(name) {
  const s = {C:0,D:2,E:4,F:5,G:7,A:9,B:11};
  return 12 * (parseInt(name.slice(-1)) + 1) + s[name[0]];
}

function playPianoNote(ctx, freq, t) {
  const gain = ctx.createGain();
  gain.connect(ctx.destination);
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.45, t + 0.012);
  gain.gain.exponentialRampToValueAtTime(0.22, t + 0.15);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 1.4);

  const osc = ctx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  osc.connect(gain);
  osc.start(t);
  osc.stop(t + 1.5);
}

function playScale(notes) {
  const ctx = getAudioCtx();
  const gap = 0.55;

  notes.forEach((note, i) => {
    const base = CLEF_NOTES[clef].find(n => n.pos === note.pos);
    if (!base) return;
    let midi = noteToMidi(base.name);
    if (note.acc === '#') midi += 1;
    if (note.acc === 'b') midi -= 1;
    const t = ctx.currentTime + 0.05 + i * gap;
    playPianoNote(ctx, midiToFreq(midi), t);
    setTimeout(() => drawScaleStaff(notes, notes.length, i), (0.05 + i * gap) * 1000);
  });

  setTimeout(() => drawScaleStaff(notes, notes.length, -1), (0.05 + notes.length * gap) * 1000);
}

// ── Shared ────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('score').textContent    = score;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('accuracy').textContent = total ? Math.round(score/total*100)+'%' : '—';
}

function answer(letter, btn) {
  if (mode === 'scales') answerScale(letter, btn);
  else answerSingle(letter, btn);
}

function nextNote() {
  if (mode === 'scales') nextScale();
  else nextSingle();
}

// ── UI controls ───────────────────────────────────────────────────────────────
function setMode(m, btnEl) {
  mode = m;
  document.querySelectorAll('#modeBtns .mode-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  clearInterval(timerHandle);
  const td = document.getElementById('timerDisplay');
  td.style.visibility = m === 'single' ? 'visible' : 'hidden';
  if (m === 'single') nextSingle();
  else nextScale();
  if (refOpen) drawRefChart();
}

function setClef(c, btnEl) {
  clef = c;
  document.querySelectorAll('#clefBtns .clef-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  if (mode === 'single') nextSingle();
  else nextScale();
  if (refOpen) drawRefChart();
}

function toggleRef() {
  refOpen = !refOpen;
  document.getElementById('refPanel').classList.toggle('show', refOpen);
  document.getElementById('refToggleBtn').textContent =
    refOpen ? 'Hide Reference Chart' : 'Show Note Reference Chart';
  if (refOpen) drawRefChart();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const key = e.key.toUpperCase();
  if ('ABCDEFG'.includes(key) && key.length===1) {
    const btn = document.querySelector(`.note-btn[data-l="${key}"]`);
    if (btn) { answer(key, btn); return; }
  }
  if ((e.key==='Enter'||e.key===' ') && !e.repeat) {
    const nb = document.getElementById('nextBtn');
    if (nb.classList.contains('show')) { e.preventDefault(); nextNote(); }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  const grid = document.getElementById('buttonsGrid');
  ['A','B','C','D','E','F','G'].forEach(letter => {
    const btn = document.createElement('button');
    btn.className='note-btn'; btn.dataset.l=letter; btn.textContent=letter;
    btn.onclick = () => answer(letter, btn);
    grid.appendChild(btn);
  });
  nextSingle();
})();
</script>

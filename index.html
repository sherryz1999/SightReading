<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sight Reading Trainer</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
  gap: 14px;
}

header { text-align: center; }

h1 { font-size: 1.8rem; font-weight: 700; color: #58a6ff; }
.tagline { color: #8b949e; font-size: 0.85rem; margin-top: 3px; }

.stats {
  display: flex;
  gap: 24px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  padding: 12px 28px;
}
.stat { text-align: center; }
.stat-label { font-size: 0.68rem; text-transform: uppercase; color: #8b949e; letter-spacing: .06em; }
.stat-value { font-size: 1.6rem; font-weight: 700; color: #58a6ff; }
#streak { color: #f78166; }

.timer-display {
  text-align: center;
  font-size: 1.6rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #8b949e;
  margin-bottom: 10px;
  letter-spacing: .02em;
  transition: color .2s;
}
.timer-display.fast { color: #3fb950; }
.timer-display.slow { color: #f78166; }

.main-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 16px;
  padding: 22px;
  width: 100%;
  max-width: 560px;
}

.staff-wrapper {
  background: #fffef5;
  border-radius: 10px;
  padding: 6px 10px;
  margin-bottom: 18px;
  line-height: 0;
}

#staffSvg {
  width: 100%;
  height: auto;
  display: block;
  max-width: 540px;
  margin: 0 auto;
}

.reveal-area {
  min-height: 50px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}
.note-revealed { font-size: 2.4rem; font-weight: 700; color: #58a6ff; }
.feedback-msg { font-size: 1rem; font-weight: 600; }
.feedback-msg.ok  { color: #3fb950; }
.feedback-msg.bad { color: #f78166; }

.hint {
  text-align: center;
  color: #8b949e;
  font-size: 0.82rem;
  margin-bottom: 12px;
  min-height: 18px;
}

.buttons-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 7px;
  margin-bottom: 13px;
}
.note-btn {
  padding: 15px 0;
  border: 2px solid #21262d;
  background: #21262d;
  color: #e6edf3;
  border-radius: 8px;
  font-size: 1.1rem;
  font-weight: 700;
  cursor: pointer;
  transition: all .12s;
  user-select: none;
}
.note-btn:hover:not(:disabled) { background: #2d333b; border-color: #58a6ff; }
.note-btn:disabled { cursor: default; }
.note-btn.correct { background: #1c3a25; border-color: #3fb950; color: #3fb950; }
.note-btn.wrong   { background: #3a1c1c; border-color: #f78166; color: #f78166; }

.next-btn {
  width: 100%;
  padding: 13px;
  background: #238636;
  border: 1px solid #2ea043;
  border-radius: 8px;
  color: white;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: background .15s;
  display: none;
}
.next-btn:hover { background: #2ea043; }
.next-btn.show  { display: block; }

.kbd-hint {
  text-align: center;
  font-size: 0.72rem;
  color: #484f58;
  margin-top: 9px;
}

.settings {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 16px;
  padding: 16px 22px;
  width: 100%;
  max-width: 560px;
}
.settings-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #8b949e;
  margin-bottom: 9px;
}
.range-btns { display: flex; gap: 7px; }
.range-btn {
  flex: 1;
  padding: 10px 6px;
  border: 2px solid #21262d;
  background: #21262d;
  color: #8b949e;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.78rem;
  font-weight: 600;
  line-height: 1.5;
  transition: all .15s;
}
.range-btn.active { border-color: #58a6ff; color: #58a6ff; background: #0e1f35; }

.ref-toggle-row { text-align: center; margin-top: 11px; }
.ref-btn {
  background: none;
  border: 1px solid #30363d;
  color: #8b949e;
  border-radius: 6px;
  padding: 6px 16px;
  cursor: pointer;
  font-size: 0.78rem;
  transition: all .15s;
}
.ref-btn:hover { border-color: #58a6ff; color: #58a6ff; }

.ref-panel {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 14px;
  padding: 16px 20px;
  width: 100%;
  max-width: 560px;
  display: none;
}
.ref-panel.show { display: block; }
.ref-panel-title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #8b949e;
  margin-bottom: 10px;
}
.ref-staff-wrap {
  background: #fffef5;
  border-radius: 8px;
  padding: 6px 8px;
  line-height: 0;
  overflow-x: auto;
}
#refSvg { display: block; width: 100%; height: auto; }

@media (max-width: 480px) {
  .note-btn { font-size: 0.95rem; padding: 12px 0; }
  .stats { gap: 14px; padding: 10px 16px; }
  .buttons-grid { gap: 4px; }
}
</style>
</head>
<body>

<header>
  <h1>Sight Reading Trainer</h1>
  <p class="tagline">Master clef note reading</p>
</header>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Streak</div>
    <div class="stat-value" id="streak">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Accuracy</div>
    <div class="stat-value" id="accuracy">—</div>
  </div>
</div>

<div class="main-card">
  <div class="staff-wrapper">
    <svg id="staffSvg" viewBox="0 0 520 170" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>

  <div class="timer-display" id="timerDisplay">0.0s</div>

  <div class="reveal-area">
    <div id="revealContent"></div>
  </div>

  <p class="hint" id="hintText"></p>

  <div class="buttons-grid" id="buttonsGrid"></div>

  <button class="next-btn" id="nextBtn" onclick="nextNote()">Next Note →</button>

  <p class="kbd-hint">Keyboard: press A–G to answer &nbsp;·&nbsp; Enter / Space for next</p>
</div>

<div class="settings">
  <div class="settings-title">Clef</div>
  <div class="range-btns" id="clefBtns">
    <button class="range-btn active" onclick="setClef('bass',this)">Bass Clef</button>
    <button class="range-btn" onclick="setClef('alto',this)">Alto Clef</button>
  </div>
  <div class="settings-title" style="margin-top:12px">Note Range</div>
  <div class="range-btns" id="rangeBtns">
    <button class="range-btn active" id="rangeBtn-beginner" onclick="setRange('beginner',this)">Beginner<br><span id="rangeLabel-beginner">G2 – A3</span></button>
    <button class="range-btn" id="rangeBtn-intermediate" onclick="setRange('intermediate',this)">Intermediate<br><span id="rangeLabel-intermediate">E2 – C4</span></button>
    <button class="range-btn" id="rangeBtn-advanced" onclick="setRange('advanced',this)">Advanced<br><span id="rangeLabel-advanced">C2 – D4</span></button>
  </div>
  <div class="ref-toggle-row">
    <button class="ref-btn" id="refToggleBtn" onclick="toggleRef()">Show Note Reference Chart</button>
  </div>
</div>

<div class="ref-panel" id="refPanel">
  <div class="ref-panel-title">Note Reference Chart</div>
  <div class="ref-staff-wrap">
    <svg id="refSvg" xmlns="http://www.w3.org/2000/svg"></svg>
  </div>
</div>

<script>
// ── Bass clef note definitions ─────────────────────────────────────────────────
// pos: staff position where 0 = bottom line; each step = one note
const NOTES = [
  { name:'C2', letter:'C', pos:-4 },
  { name:'D2', letter:'D', pos:-3 },
  { name:'E2', letter:'E', pos:-2 },
  { name:'F2', letter:'F', pos:-1 },
  { name:'G2', letter:'G', pos: 0 },
  { name:'A2', letter:'A', pos: 1 },
  { name:'B2', letter:'B', pos: 2 },
  { name:'C3', letter:'C', pos: 3 },
  { name:'D3', letter:'D', pos: 4 },
  { name:'E3', letter:'E', pos: 5 },
  { name:'F3', letter:'F', pos: 6 },
  { name:'G3', letter:'G', pos: 7 },
  { name:'A3', letter:'A', pos: 8 },
  { name:'B3', letter:'B', pos: 9 },
  { name:'C4', letter:'C', pos:10 },
  { name:'D4', letter:'D', pos:11 },
];

const RANGES = {
  beginner:     { min: 0,  max: 8  },
  intermediate: { min:-2,  max:10  },
  advanced:     { min:-4,  max:11  },
};

// ── Alto clef note definitions ─────────────────────────────────────────────────
// pos: same formula; bottom line = F3 (pos 0), middle (3rd) line = C4 (pos 4)
const ALTO_NOTES = [
  { name:'B2', letter:'B', pos:-4 },
  { name:'C3', letter:'C', pos:-3 },
  { name:'D3', letter:'D', pos:-2 },
  { name:'E3', letter:'E', pos:-1 },
  { name:'F3', letter:'F', pos: 0 },
  { name:'G3', letter:'G', pos: 1 },
  { name:'A3', letter:'A', pos: 2 },
  { name:'B3', letter:'B', pos: 3 },
  { name:'C4', letter:'C', pos: 4 },
  { name:'D4', letter:'D', pos: 5 },
  { name:'E4', letter:'E', pos: 6 },
  { name:'F4', letter:'F', pos: 7 },
  { name:'G4', letter:'G', pos: 8 },
  { name:'A4', letter:'A', pos: 9 },
  { name:'B4', letter:'B', pos:10 },
  { name:'C5', letter:'C', pos:11 },
];

const ALTO_RANGES = {
  beginner:     { min: 0,  max: 8  },
  intermediate: { min:-2,  max:10  },
  advanced:     { min:-4,  max:11  },
};

const RANGE_LABELS = {
  bass: { beginner:'G2 – A3', intermediate:'E2 – C4', advanced:'C2 – D4' },
  alto: { beginner:'F3 – G4', intermediate:'D3 – B4', advanced:'B2 – C5' },
};

// ── SVG layout constants ───────────────────────────────────────────────────────
const BY      = 108;   // y of pos=0 (bottom line)
const STEP    = 6;     // px per note step
const SL      = 90;    // staff left x
const SR      = 480;   // staff right x
const NOTE_X  = 290;   // x of quiz note head
const LHW     = 20;    // ledger line half-width

// ── State ─────────────────────────────────────────────────────────────────────
let clef       = 'bass';
let range      = 'beginner';
let current    = null;
let answered   = false;
let score      = 0;
let streak     = 0;
let total      = 0;
let refOpen    = false;
let startTime  = null;
let timerHandle= null;

// Adaptive weighting: track errors per note name (shared across clefs)
const weights = {};
[...NOTES, ...ALTO_NOTES].forEach(n => { if (!weights[n.name]) weights[n.name] = 1; });

// ── Helpers ───────────────────────────────────────────────────────────────────
const posY = pos => BY - pos * STEP;

function ledgersFor(pos) {
  const out = [];
  if (pos <= -2) {
    const lo = pos % 2 === 0 ? pos : pos + 1;
    for (let p = -2; p >= lo; p -= 2) out.push(p);
  }
  if (pos >= 10) {
    const hi = pos % 2 === 0 ? pos : pos - 1;
    for (let p = 10; p <= hi; p += 2) out.push(p);
  }
  return out;
}

function el(tag, attrs, parent) {
  const e = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) e.setAttribute(k, v);
  if (parent) parent.appendChild(e);
  return e;
}

// ── Drawing ───────────────────────────────────────────────────────────────────
function drawBassClef(svg) {
  // Body from bass-clef-svgrepo-com.svg (source viewBox 0 0 512 512).
  // Scale 0.165, translate(1,42): beak lands on F3 line (y=72), body spans y=42–127.
  const g = el('g', { transform: 'translate(1,42) scale(0.165)' }, svg);
  el('path', {
    d: 'M176.014,0l-2.823,0.01C89.091,1.164,20.78,63.557,15.904,118.564'
     + 'c-3.125,35.072,4.693,63.941,22.568,83.494'
     + 'c16.307,17.803,39.765,26.836,69.727,26.836'
     + 'c31.095,0,61.603-29.77,61.603-60.106'
     + 'c0-30.803-25.076-55.869-55.888-55.869'
     + 'c-16.569,0-27.575,7.323-34.858,12.179'
     + 'c-2.853,1.892-5.796,3.854-7.121,3.854'
     + 'c-0.446,0-1.477-1.184-2.458-5.635'
     + 'c-3.399-15.335,1.902-33.644,14.212-48.98'
     + 'c10.399-12.978,34.858-34.726,81.876-34.726'
     + 'c65.67,0,101.833,52.894,101.833,148.952'
     + 'c0,192.852-165.703,271.845-216.483,291.459'
     + 'c-10.398,4.016-13.778,12.716-12.492,19.553'
     + 'C39.828,507.002,45.947,512,53.686,512'
     + 'c2.448,0,5.037-0.496,7.657-1.477l5.807-2.165'
     + 'C262.916,435.82,362.19,326.247,362.19,182.648'
     + 'C362.19,57.164,265.688,0,176.014,0z',
    fill: '#111'
  }, g);
  // Two dots alongside the beak: above and below F3 line
  el('circle', { cx: 77, cy: 66, r: 7, fill: '#111' }, svg);
  el('circle', { cx: 77, cy: 78, r: 7, fill: '#111' }, svg);
}

function drawAltoClef(svg) {
  // Path from alto_Clef.svg (path19). Source viewBox spans x 4752–6284, y 5217–7579.
  // Scale = 48px / 2362 source units = 0.0203. Translate maps source origin to staff coords.
  const g = el('g', { transform: 'translate(-92.6,-46) scale(0.0203)' }, svg);
  el('path', {
    d: 'M 4752,7579 L 4752,5273 L 4752,5222 L 5018,5222 L 5018,7528 L 5018,7579 L 4752,7579 z'
     + ' M 5152,7579 L 5152,5273 L 5152,5222 L 5237,5222 L 5237,6377'
     + ' C 5279,6355 5322,6310 5364,6239 C 5407,6169 5443,6095 5471,6016'
     + ' C 5499,5937 5514,5879 5516,5841 C 5529,5925 5550,5992 5578,6043'
     + ' C 5607,6093 5638,6129 5674,6151 C 5710,6172 5745,6183 5781,6183'
     + ' C 5870,6183 5926,6143 5950,6062 C 5974,5981 5986,5882 5986,5765'
     + ' C 5986,5712 5985,5664 5982,5622 C 5979,5580 5973,5537 5962,5494'
     + ' C 5952,5451 5935,5412 5911,5378 C 5886,5344 5854,5320 5814,5308'
     + ' C 5778,5298 5742,5293 5707,5293 C 5675,5293 5648,5299 5627,5310'
     + ' C 5605,5321 5593,5338 5591,5358 C 5596,5376 5608,5397 5629,5422'
     + ' C 5650,5446 5664,5465 5672,5477 C 5680,5489 5684,5506 5684,5529'
     + ' C 5684,5570 5670,5604 5642,5632 C 5614,5660 5577,5675 5530,5675'
     + ' C 5484,5675 5446,5658 5418,5625 C 5390,5591 5375,5551 5373,5506'
     + ' C 5377,5445 5399,5392 5438,5348 C 5478,5305 5527,5272 5586,5250'
     + ' C 5645,5228 5704,5217 5764,5217 C 5832,5217 5897,5229 5959,5253'
     + ' C 6022,5277 6078,5313 6126,5359 C 6175,5406 6214,5463 6242,5531'
     + ' C 6270,5598 6284,5675 6284,5760 C 6284,5878 6262,5976 6219,6053'
     + ' C 6175,6131 6119,6189 6051,6225 C 5982,6261 5909,6281 5832,6283'
     + ' C 5752,6278 5685,6260 5632,6229 L 5526,6401 L 5632,6572'
     + ' C 5705,6542 5777,6527 5847,6527 C 5936,6527 6013,6553 6080,6603'
     + ' C 6146,6654 6197,6719 6232,6800 C 6266,6881 6284,6964 6284,7050'
     + ' C 6284,7144 6263,7232 6221,7313 C 6179,7394 6120,7458 6044,7507'
     + ' C 5967,7555 5880,7579 5781,7579 C 5666,7574 5570,7547 5493,7497'
     + ' C 5416,7448 5378,7374 5378,7277 C 5382,7230 5399,7194 5429,7167'
     + ' C 5459,7139 5491,7125 5526,7122 C 5568,7122 5606,7137 5639,7167'
     + ' C 5672,7196 5689,7233 5689,7277 C 5689,7294 5685,7310 5677,7325'
     + ' C 5669,7339 5658,7356 5642,7376 C 5626,7395 5615,7409 5609,7418'
     + ' C 5603,7428 5598,7439 5596,7453 C 5596,7471 5607,7486 5630,7498'
     + ' C 5652,7510 5681,7517 5716,7520 C 5826,7515 5899,7468 5936,7381'
     + ' C 5972,7292 5990,7183 5990,7050 C 5990,6935 5977,6834 5951,6748'
     + ' C 5925,6661 5869,6618 5781,6618 C 5703,6618 5643,6651 5601,6719'
     + ' C 5559,6786 5532,6865 5520,6956 C 5507,6879 5487,6805 5458,6734'
     + ' C 5429,6662 5396,6599 5357,6545 C 5320,6492 5279,6449 5237,6419'
     + ' L 5237,7579 L 5152,7579 z',
    fill: '#111'
  }, g);
}

function drawStaffLines(svg, staffRight) {
  for (let i = 0; i <= 4; i++) {
    el('line', {
      x1: 4, y1: posY(i*2),
      x2: staffRight, y2: posY(i*2),
      stroke: '#444', 'stroke-width': 1.5
    }, svg);
  }
}

function drawNote(svg, pos, nx, noteR=10, color='#1a1a2e') {
  const ny = posY(pos);

  for (const lp of ledgersFor(pos)) {
    el('line', {
      x1: nx - LHW, y1: posY(lp),
      x2: nx + LHW, y2: posY(lp),
      stroke: '#444', 'stroke-width': 1.5
    }, svg);
  }

  el('ellipse', { cx: nx, cy: ny, rx: noteR, ry: noteR*0.7, fill: color }, svg);

  const up = pos < 4;
  const sx = up ? nx + noteR : nx - noteR;
  el('line', {
    x1: sx, y1: ny,
    x2: sx, y2: up ? ny - 44 : ny + 44,
    stroke: color, 'stroke-width': 2
  }, svg);
}

function drawQuizStaff(pos) {
  const svg = document.getElementById('staffSvg');
  svg.innerHTML = '';
  drawStaffLines(svg, SR);
  if (clef === 'alto') drawAltoClef(svg);
  else drawBassClef(svg);
  drawNote(svg, pos, NOTE_X);
}

function drawRefChart() {
  const notes = activeNotes();
  const count = notes.length;
  const span  = SR - SL - 30;
  const gap   = Math.max(20, Math.min(46, span / (count + 1)));
  const startX = SL + gap;
  const noteR  = Math.min(9, gap * 0.4);

  const topNote = notes.reduce((mn, n) => n.pos > mn ? n.pos : mn, 0);
  const botNote = notes.reduce((mx, n) => n.pos < mx ? n.pos : mx, 0);
  const svgH    = Math.max(165, BY - botNote*STEP + 40);
  const labelY  = BY - botNote*STEP + 25;

  const refSvg = document.getElementById('refSvg');
  refSvg.setAttribute('viewBox', `0 0 520 ${svgH}`);
  refSvg.innerHTML = '';

  drawStaffLines(refSvg, SR);
  if (clef === 'alto') drawAltoClef(refSvg);
  else drawBassClef(refSvg);

  notes.forEach((note, i) => {
    const nx = startX + i * gap;
    drawNote(refSvg, note.pos, nx, noteR, '#2a2a6a');
    el('text', {
      x: nx, y: labelY,
      'text-anchor': 'middle',
      'font-size': 10,
      'font-family': 'system-ui, sans-serif',
      fill: '#333', 'font-weight': 'bold'
    }, refSvg).textContent = note.name;
  });
}

// ── Timer ─────────────────────────────────────────────────────────────────────
function startTimer() {
  clearInterval(timerHandle);
  startTime = Date.now();
  const disp = document.getElementById('timerDisplay');
  disp.textContent = '0.0s';
  disp.className = 'timer-display';
  timerHandle = setInterval(() => {
    disp.textContent = ((Date.now() - startTime) / 1000).toFixed(1) + 's';
  }, 100);
}

function stopTimer() {
  clearInterval(timerHandle);
  timerHandle = null;
  const elapsed = startTime ? (Date.now() - startTime) / 1000 : 0;
  const disp = document.getElementById('timerDisplay');
  disp.textContent = elapsed.toFixed(1) + 's';
  disp.classList.add(elapsed <= 3 ? 'fast' : 'slow');
  return elapsed.toFixed(1);
}

// ── Game logic ────────────────────────────────────────────────────────────────
function activeNotes() {
  const notes  = clef === 'alto' ? ALTO_NOTES : NOTES;
  const ranges = clef === 'alto' ? ALTO_RANGES : RANGES;
  const r = ranges[range];
  return notes.filter(n => n.pos >= r.min && n.pos <= r.max);
}

function pickNote() {
  const pool = activeNotes();
  const totalW = pool.reduce((s, n) => s + weights[n.name], 0);
  let rand = Math.random() * totalW;
  for (const n of pool) {
    rand -= weights[n.name];
    if (rand <= 0) return n;
  }
  return pool[pool.length - 1];
}

function nextNote() {
  answered = false;
  current  = pickNote();

  document.getElementById('revealContent').innerHTML = '';
  document.getElementById('nextBtn').classList.remove('show');
  document.getElementById('hintText').textContent = 'Which note is this?';

  document.querySelectorAll('.note-btn').forEach(b => {
    b.classList.remove('correct','wrong');
    b.disabled = false;
  });

  drawQuizStaff(current.pos);
  startTimer();
}

function answer(letter, btn) {
  if (answered) return;
  answered = true;
  total++;

  const elapsed = stopTimer();
  const correct = (letter === current.letter);

  document.querySelectorAll('.note-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.l === current.letter) b.classList.add('correct');
  });

  if (correct) {
    score++;
    streak++;
    weights[current.name] = Math.max(1, weights[current.name] * 0.8);
    document.getElementById('revealContent').innerHTML =
      `<span class="feedback-msg ok">✓ Correct! &nbsp;<strong>${current.name}</strong> &nbsp;·&nbsp; ${elapsed}s</span>`;
  } else {
    streak = 0;
    btn.classList.add('wrong');
    weights[current.name] = Math.min(10, weights[current.name] * 1.6);
    document.getElementById('revealContent').innerHTML =
      `<span class="feedback-msg bad">✗ That was &nbsp;<strong>${current.name}</strong> &nbsp;·&nbsp; ${elapsed}s</span>`;
  }

  document.getElementById('hintText').textContent = '';
  document.getElementById('score').textContent    = score;
  document.getElementById('streak').textContent   = streak;
  document.getElementById('accuracy').textContent =
    Math.round(score / total * 100) + '%';
  document.getElementById('nextBtn').classList.add('show');
}

// ── UI controls ───────────────────────────────────────────────────────────────
function setClef(c, btnEl) {
  clef = c;
  document.querySelectorAll('#clefBtns .range-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  ['beginner','intermediate','advanced'].forEach(r => {
    document.getElementById('rangeLabel-' + r).textContent = RANGE_LABELS[c][r];
  });
  range = 'beginner';
  document.querySelectorAll('#rangeBtns .range-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('rangeBtn-beginner').classList.add('active');
  nextNote();
  if (refOpen) drawRefChart();
}

function setRange(r, btnEl) {
  range = r;
  document.querySelectorAll('#rangeBtns .range-btn').forEach(b => b.classList.remove('active'));
  btnEl.classList.add('active');
  nextNote();
  if (refOpen) drawRefChart();
}

function toggleRef() {
  refOpen = !refOpen;
  document.getElementById('refPanel').classList.toggle('show', refOpen);
  document.getElementById('refToggleBtn').textContent =
    refOpen ? 'Hide Reference Chart' : 'Show Note Reference Chart';
  if (refOpen) drawRefChart();
}

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  const key = e.key.toUpperCase();

  if ('ABCDEFG'.includes(key) && key.length === 1) {
    const btn = document.querySelector(`.note-btn[data-l="${key}"]`);
    if (btn && !btn.disabled) { answer(key, btn); return; }
  }

  if ((e.key === 'Enter' || e.key === ' ') && !e.repeat) {
    const nb = document.getElementById('nextBtn');
    if (nb.classList.contains('show')) { e.preventDefault(); nextNote(); }
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
(function init() {
  const grid = document.getElementById('buttonsGrid');
  ['A','B','C','D','E','F','G'].forEach(letter => {
    const btn = document.createElement('button');
    btn.className   = 'note-btn';
    btn.dataset.l   = letter;
    btn.textContent = letter;
    btn.onclick     = () => answer(letter, btn);
    grid.appendChild(btn);
  });
  nextNote();
})();
</script>
</body>
</html>
